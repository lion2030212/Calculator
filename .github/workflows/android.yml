name: Build Samsung Calc APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-dev zip unzip openjdk-17-jdk libffi-dev libssl-dev
        # تثبيت المكتبات الأساسية لـ Kivy/Tkinter بدون تعقيدات GStreamer
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev python3-tk
        pip install --upgrade pip
        pip install --user --upgrade buildozer Cython==0.29.33

    - name: Build with Buildozer
      run: |
        yes | buildozer -v android debug
      continue-on-error: false

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-Calculator-Debug
        path: bin/*.apk
